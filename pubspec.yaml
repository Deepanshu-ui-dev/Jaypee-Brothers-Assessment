name: fintrack
description: A personal finance tracker app with Firebase and Riverpod.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Charts
  fl_chart: ^0.68.0

  # Fonts
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Environment
  flutter_dotenv: ^5.1.0

  # Biometric
  local_auth: ^2.3.0

  # Export
  csv: ^6.0.0
  share_plus: ^9.0.0

  # Date/Time
  intl: ^0.19.0

  # Utilities
  collection: ^1.18.0
  uuid: ^4.4.0
  path_provider: ^2.1.3

  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - shorebird.yaml
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1C2030"
  adaptive_icon_foreground: "assets/images/app_logo.png"
